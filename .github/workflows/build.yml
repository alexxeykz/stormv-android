name: Build StormV Android

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download sing-box for Android (arm64)
        run: |
          # fd в TUN inbound поддерживался до введения strict JSON (~v1.8.0)
          # Ищем последний стабильный релиз из v1.7.x, затем v1.6.x
          RELEASES=$(curl -s "https://api.github.com/repos/SagerNet/sing-box/releases?per_page=100")
          LATEST=""
          for MINOR in 7 6 5; do
            LATEST=$(echo "$RELEASES" | grep '"tag_name"' \
              | grep "\"v1\\.${MINOR}\\." | grep -v 'alpha\|beta\|rc' | head -1 \
              | sed 's/.*"v\([^"]*\)".*/\1/')
            if [ -n "$LATEST" ]; then
              echo "Found v1.${MINOR}.x: $LATEST"
              break
            fi
          done
          if [ -z "$LATEST" ]; then
            echo "Fallback to hardcoded version 1.7.0"
            LATEST="1.7.0"
          fi
          echo "sing-box version: $LATEST"
          curl -L "https://github.com/SagerNet/sing-box/releases/download/v${LATEST}/sing-box-${LATEST}-android-arm64.tar.gz" -o sing-box.tar.gz
          tar -xzf sing-box.tar.gz
          mkdir -p app/src/main/jniLibs/arm64-v8a
          # Бинарник называется sing-box, переименовываем в libsingbox.so
          BINARY=$(find . -name "sing-box" -type f | grep -v "\.tar" | head -1)
          echo "Found binary: $BINARY"
          cp "$BINARY" app/src/main/jniLibs/arm64-v8a/libsingbox.so
          chmod +x app/src/main/jniLibs/arm64-v8a/libsingbox.so
          ls -lh app/src/main/jniLibs/arm64-v8a/

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > stormv.jks

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StormV-release
          path: app/build/outputs/apk/release/*.apk

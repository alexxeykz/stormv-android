name: Build StormV Android

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download sing-box for Android (arm64)
        run: |
          LATEST=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep tag_name | cut -d'"' -f4 | sed 's/v//')
          curl -L "https://github.com/SagerNet/sing-box/releases/download/v${LATEST}/sing-box-${LATEST}-android-arm64.tar.gz" -o sing-box.tar.gz
          tar -xzf sing-box.tar.gz
          mkdir -p app/src/main/jniLibs/arm64-v8a
          cp sing-box-*/libsingbox.so app/src/main/jniLibs/arm64-v8a/ 2>/dev/null || \
          find . -name "*.so" | head -1 | xargs -I{} cp {} app/src/main/jniLibs/arm64-v8a/libsingbox.so

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > stormv.jks

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StormV-release
          path: app/build/outputs/apk/release/*.apk

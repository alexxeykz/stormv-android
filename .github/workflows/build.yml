name: Build StormV Android

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download sing-box for Android (arm64)
        run: |
          # Фиксируем 1.9.x — последняя версия с поддержкой поля fd в TUN inbound
          # Используем per_page=100 чтобы найти 1.9.x среди новых релизов
          LATEST=$(curl -s "https://api.github.com/repos/SagerNet/sing-box/releases?per_page=100" \
            | grep '"tag_name"' | grep 'v1\.9\.' | grep -v 'alpha\|beta\|rc' | head -1 \
            | sed 's/.*"v\([^"]*\)".*/\1/')
          echo "sing-box version: $LATEST"
          if [ -z "$LATEST" ]; then
            echo "Fallback to hardcoded version 1.9.7"
            LATEST="1.9.7"
          fi
          curl -L "https://github.com/SagerNet/sing-box/releases/download/v${LATEST}/sing-box-${LATEST}-android-arm64.tar.gz" -o sing-box.tar.gz
          tar -xzf sing-box.tar.gz
          mkdir -p app/src/main/jniLibs/arm64-v8a
          # Бинарник называется sing-box, переименовываем в libsingbox.so
          BINARY=$(find . -name "sing-box" -type f | grep -v "\.tar" | head -1)
          echo "Found binary: $BINARY"
          cp "$BINARY" app/src/main/jniLibs/arm64-v8a/libsingbox.so
          chmod +x app/src/main/jniLibs/arm64-v8a/libsingbox.so
          ls -lh app/src/main/jniLibs/arm64-v8a/

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > stormv.jks

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StormV-release
          path: app/build/outputs/apk/release/*.apk

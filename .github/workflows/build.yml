name: Build StormV Android

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download sing-box (arm64-v8a, armeabi-v7a, x86_64)
        run: |
          RELEASES=$(curl -s "https://api.github.com/repos/SagerNet/sing-box/releases?per_page=100")
          VERSION=""
          for MINOR in 7 6 5; do
            VERSION=$(echo "$RELEASES" | grep '"tag_name"' \
              | grep "\"v1\\.${MINOR}\\." | grep -v 'alpha\|beta\|rc' | head -1 \
              | sed 's/.*"v\([^"]*\)".*/\1/')
            [ -n "$VERSION" ] && { echo "sing-box version: $VERSION"; break; }
          done
          [ -z "$VERSION" ] && VERSION="1.7.0"
          BASE="https://github.com/SagerNet/sing-box/releases/download/v${VERSION}"

          download_singbox() {
            local ABI=$1 ARCH=$2
            TMP=$(mktemp -d)
            curl -fL "${BASE}/sing-box-${VERSION}-${ARCH}.tar.gz" | tar -xz -C "$TMP"
            BINARY=$(find "$TMP" -name "sing-box" -type f | head -1)
            mkdir -p "app/src/main/jniLibs/${ABI}"
            cp "$BINARY" "app/src/main/jniLibs/${ABI}/libsingbox.so"
            chmod +x "app/src/main/jniLibs/${ABI}/libsingbox.so"
            rm -rf "$TMP"
            echo "sing-box ${ABI}: OK ($(du -h "app/src/main/jniLibs/${ABI}/libsingbox.so" | cut -f1))"
          }

          download_singbox arm64-v8a   android-arm64
          download_singbox x86_64      android-amd64

      - name: Download tun2socks (arm64-v8a, armeabi-v7a, x86_64)
        run: |
          RELEASE=$(curl -s "https://api.github.com/repos/xjasonlyu/tun2socks/releases/latest")
          VERSION=$(echo "$RELEASE" | grep '"tag_name"' | head -1 | sed 's/.*"v\([^"]*\)".*/\1/')
          echo "tun2socks version: $VERSION"
          BASE="https://github.com/xjasonlyu/tun2socks/releases/download/v${VERSION}"

          download_tun2socks() {
            local ABI=$1 ARCH=$2
            TMP=$(mktemp -d)
            curl -fL "${BASE}/tun2socks-${ARCH}.zip" -o "$TMP/t.zip"
            unzip -q "$TMP/t.zip" -d "$TMP"
            BINARY=$(find "$TMP" -type f ! -name "*.zip" ! -name "*.txt" ! -name "*.md" | head -1)
            mkdir -p "app/src/main/jniLibs/${ABI}"
            cp "$BINARY" "app/src/main/jniLibs/${ABI}/libtun2socks.so"
            chmod +x "app/src/main/jniLibs/${ABI}/libtun2socks.so"
            rm -rf "$TMP"
            echo "tun2socks ${ABI}: OK ($(du -h "app/src/main/jniLibs/${ABI}/libtun2socks.so" | cut -f1))"
          }

          download_tun2socks arm64-v8a   android-arm64
          download_tun2socks x86_64      android-amd64

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > stormv.jks

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StormV-release
          path: app/build/outputs/apk/release/*.apk
